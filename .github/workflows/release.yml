name: Release

# 推送形如 v1.0.0 的 tag 时自动构建 arm64 / x86_64 两个 macOS 包并发布 Release；
# 也可在 Actions 页手动触发（只构建产物，不发布 Release）。
on:
  push:
    tags: ["v*"]
  workflow_dispatch:

# 同一时间只允许一个 release 在跑；新 tag 推送会等当前构建跑完，不取消进行中的发布。
concurrency:
  group: release
  cancel-in-progress: false

permissions:
  contents: write          # 用内置 GITHUB_TOKEN 创建 Release / 上传产物所需

jobs:
  build:
    name: Build macOS ${{ matrix.arch }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: arm64
            runner: macos-15
            dmg_suffix: arm64
          - arch: x86_64
            runner: macos-15-intel
            dmg_suffix: x86_64
    runs-on: ${{ matrix.runner }}
    steps:
      - uses: actions/checkout@v4

      - name: 工具链版本
        run: |
          swift --version
          uname -m

      - name: 计算版本号（去掉 tag 前缀 v）
        run: echo "VERSION=${GITHUB_REF_NAME#v}" >> "$GITHUB_ENV"

      - name: 构建 .app
        run: ./make-app.sh   # 读取 $VERSION 写进 Info.plist；在 runner 上构建，路径不含个人用户名

      - name: 校验二进制架构
        run: |
          BIN="SSH 文件传输.app/Contents/MacOS/SFTPTransfer"
          file "$BIN"
          if ! file "$BIN" | grep -q "${{ matrix.arch }}"; then
            echo "Built binary does not contain expected architecture: ${{ matrix.arch }}" >&2
            exit 1
          fi

      - name: 打包 .dmg
        run: |
          APP="SSH 文件传输.app"
          DMG="SFTPTransfer-macOS-${GITHUB_REF_NAME#v}-${{ matrix.dmg_suffix }}.dmg"
          STAGING="$(mktemp -d)/dmg"
          mkdir -p "$STAGING"
          cp -R "$APP" "$STAGING/"
          ln -s /Applications "$STAGING/Applications"   # 安装窗口里的「拖到 Applications」快捷方式
          hdiutil create -volname "SSH 文件传输" \
            -srcfolder "$STAGING" -ov -format UDZO "$DMG"
          echo "DMG=$DMG" >> "$GITHUB_ENV"

      - name: 上传构建产物
        uses: actions/upload-artifact@v4
        with:
          name: SFTPTransfer-macOS-${{ matrix.dmg_suffix }}
          path: ${{ env.DMG }}
          if-no-files-found: error

  release:
    name: Publish GitHub Release
    needs: build
    if: startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-latest
    steps:
      - name: 下载所有 macOS 包
        uses: actions/download-artifact@v4
        with:
          pattern: SFTPTransfer-macOS-*
          path: dist
          merge-multiple: true

      - name: 发布 Release 并上传 .dmg
        env:
          GH_TOKEN: ${{ github.token }}
          GH_REPO: ${{ github.repository }}
        run: |
          ls -lh dist
          gh release create "$GITHUB_REF_NAME" dist/*.dmg \
            --title "$GITHUB_REF_NAME" \
            --generate-notes

# ── 关于签名 ────────────────────────────────────────────────────────────────
# 当前 make-app.sh 用的是 ad-hoc 签名，产出的 .dmg 未经 Apple 公证（notarize）。
# 用户下载后首次打开会被 Gatekeeper 拦（“无法验证开发者”），需右键→打开，
# 或执行：  xattr -dr com.apple.quarantine "/Applications/SSH 文件传输.app"
#
# 若有 Apple Developer 账号（$99/年），可升级为「Developer ID 签名 + 公证」做到下载即开：
# 把证书与 App Store Connect 凭据存为仓库 Secrets，在“构建 .app”后增加：
#   codesign --deep --force --options runtime --timestamp \
#            --sign "Developer ID Application: <你的名字> (<TeamID>)" "$APP"
#   xcrun notarytool submit "$DMG" --key ... --key-id ... --issuer ... --wait
#   xcrun stapler staple "$DMG"
# ─────────────────────────────────────────────────────────────────────────────
